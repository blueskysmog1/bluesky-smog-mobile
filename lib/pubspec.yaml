name: blue_sky_mobile
description: "A new Flutter project."
publish_to: 'none'

version: 1.2.2+5

environment:
  sdk: ^3.11.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  sqflite: ^2.4.2
  path: ^1.9.1
  path_provider: ^2.1.5
  uuid: ^4.5.3
  dio: ^5.9.1
  shared_preferences: ^2.5.4
  pdf: ^3.10.8
  printing: ^5.12.0
  image_picker: ^1.0.7
  http: ^1.2.0
  image: ^4.1.3
  mobile_scanner: ^5.2.3
  google_mlkit_text_recognition: ^0.13.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true

  assets:
    - assets/icon.png
